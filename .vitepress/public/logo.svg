<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg)"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#fff" stroke-width="3" opacity="0.3"/>
  
  <!-- ChaNa text -->
  <text x="100" y="85" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="bold" fill="#fff">ChaNa</text>
  
  <!-- Registry icon - connection nodes -->
  <g stroke="#fff" stroke-width="2" fill="none">
    <!-- Center node -->
    <circle cx="100" cy="130" r="8" fill="#fff"/>
    
    <!-- Surrounding nodes -->
    <circle cx="70" cy="115" r="5" fill="#fff"/>
    <circle cx="130" cy="115" r="5" fill="#fff"/>
    <circle cx="100" cy="155" r="5" fill="#fff"/>
    
    <!-- Connection lines -->
    <line x1="100" y1="130" x2="70" y2="115"/>
    <line x1="100" y1="130" x2="130" y2="115"/>
    <line x1="100" y1="130" x2="100" y2="155"/>
    
    <!-- Cross connections -->
    <line x1="70" y1="115" x2="130" y2="115" opacity="0.5"/>
  </g>
  
  <!-- Registry text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" opacity="0.8">REGISTRY</text>
</svg>